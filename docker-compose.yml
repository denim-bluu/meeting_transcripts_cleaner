services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: meeting-transcript-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_LEVEL=INFO
      - CACHE_TYPE=duckdb
      - DUCKDB_PATH=/app/data/tasks.duckdb
      - ENVIRONMENT=production
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - transcript-network
    # Resource limits for optimal performance
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: meeting-transcript-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - transcript-network

networks:
  transcript-network:
    driver: bridge

volumes:
  logs:
